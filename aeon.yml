# Aeon Configuration - Using Venice instead of Anthropic

model:
  provider: venice
  base_url: https://api.venice.ai/v1
  model: kimi-k2-6
  api_key: ${{ secrets.VENICE_API_KEY }}

skills:
  crypto-research:
    enabled: true
    schedule: "0 9 * * *"  # 9am daily
    var: "trending crypto"
    
  fitness-tracker:
    enabled: true
    schedule: "0 21 * * *"  # 9pm daily
    var: ""
    
  heartbeat:
    enabled: true
    schedule: "0 */8 * * *"  # Every 8 hours

notifications:
  telegram:
    enabled: true
    bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}

memory:
  provider: gbrain
  path: ~/gbrain
